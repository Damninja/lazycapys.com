<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product — Lazy Capys</title>
  <link rel="icon" type="image/svg+xml" href="logo.svg"/>
  <meta name="description" content="Shop capybara plushies and merch at Lazy Capys." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,800;1,400&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --terracotta: #C4623A;
      --warm-brown: #7C4A2D;
      --cream: #FFF8F0;
      --off-white: #F5E6D3;
      --sage: #7A9E7E;
      --muted: #9B7B6B;
      --border: #E8D0B8;
      --radius: 16px;
      --radius-sm: 10px;
      --shadow: 0 4px 20px rgba(124,74,45,0.1);
      --shadow-hover: 0 12px 40px rgba(124,74,45,0.18);
    }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Nunito', sans-serif;
      background: var(--cream);
      color: #3a2215;
      line-height: 1.6;
    }
    a { color: inherit; text-decoration: none; }
    button { font-family: inherit; cursor: pointer; }

    /* ── Header ── */
    .header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(255,248,240,0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
    }
    .header-inner {
      max-width: 1200px; margin: 0 auto;
      display: flex; align-items: center;
      height: 70px; gap: 32px;
    }
    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem; font-weight: 800;
      color: var(--warm-brown);
      display: flex; align-items: center; gap: 8px;
      flex-shrink: 0;
    }
    .logo img { width: 36px; height: 36px; border-radius: 50%; display: block; }
    .nav { display: flex; align-items: center; gap: 8px; flex: 1; }
    .nav a {
      padding: 8px 16px; border-radius: 50px;
      font-weight: 700; font-size: 0.95rem;
      color: var(--warm-brown);
      transition: background 0.2s, color 0.2s;
    }
    .nav a:hover, .nav a.active { background: var(--off-white); color: var(--terracotta); }
    .header-actions { display: flex; align-items: center; gap: 8px; margin-left: auto; }
    .cart-icon-btn {
      position: relative;
      background: none; border: none;
      width: 44px; height: 44px;
      border-radius: 50%;
      font-size: 1.4rem;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
      color: var(--warm-brown);
    }
    .cart-icon-btn:hover { background: var(--off-white); }
    .cart-badge {
      position: absolute; top: 2px; right: 2px;
      min-width: 18px; height: 18px;
      background: var(--terracotta); color: #fff;
      font-size: 0.65rem; font-weight: 900;
      border-radius: 99px;
      display: none; align-items: center; justify-content: center;
      padding: 0 4px;
      border: 2px solid var(--cream);
    }
    .hamburger {
      display: none;
      background: none; border: none;
      flex-direction: column; gap: 5px;
      padding: 8px; border-radius: 8px;
      transition: background 0.2s;
    }
    .hamburger:hover { background: var(--off-white); }
    .hamburger span {
      display: block; width: 22px; height: 2px;
      background: var(--warm-brown); border-radius: 2px;
      transition: transform 0.3s, opacity 0.3s;
    }
    .mobile-nav {
      display: none;
      position: fixed; inset: 0; top: 70px;
      background: var(--cream);
      padding: 24px;
      z-index: 99;
      flex-direction: column; gap: 8px;
    }
    .mobile-nav.open { display: flex; }
    .mobile-nav a {
      padding: 14px 20px; border-radius: var(--radius-sm);
      font-weight: 700; font-size: 1.1rem;
      color: var(--warm-brown);
      border: 1px solid var(--border);
      transition: background 0.2s;
    }
    .mobile-nav a:hover { background: var(--off-white); }

    /* ── Breadcrumb ── */
    .breadcrumb {
      max-width: 1200px; margin: 0 auto;
      padding: 16px 24px 0;
      font-size: 0.82rem; color: var(--muted);
      display: flex; align-items: center; gap: 6px;
    }
    .breadcrumb a { color: var(--muted); transition: color 0.2s; }
    .breadcrumb a:hover { color: var(--terracotta); }
    .breadcrumb span { opacity: 0.5; }

    /* ── Product Section ── */
    .product-container {
      max-width: 1200px; margin: 24px auto;
      padding: 0 24px;
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 60px; align-items: start;
    }

    /* ── Image Panel ── */
    .product-image-panel {
      position: sticky; top: 90px;
    }
    .product-image-main {
      border-radius: 24px;
      overflow: hidden;
      box-shadow: var(--shadow-hover);
    }
    .product-image-box {
      aspect-ratio: 1;
      display: flex; align-items: center; justify-content: center;
      font-size: 9rem;
      transition: transform 0.4s ease;
    }
    .product-image-box:hover { transform: scale(1.03); }
    .product-image-badge {
      position: absolute; top: 16px; left: 16px;
      padding: 6px 14px; border-radius: 50px;
      font-size: 0.78rem; font-weight: 800; color: #fff;
    }
    .product-image-wrap { position: relative; }
    .product-trust {
      display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap;
    }
    .trust-item {
      background: #fff; border-radius: var(--radius-sm);
      padding: 10px 14px;
      display: flex; align-items: center; gap: 8px;
      font-size: 0.82rem; font-weight: 700; color: var(--muted);
      box-shadow: var(--shadow); flex: 1; min-width: 120px;
    }
    .trust-item span:first-child { font-size: 1rem; }

    /* ── Info Panel ── */
    .product-info { padding-bottom: 40px; }
    .product-category {
      font-size: 0.75rem; font-weight: 800;
      color: var(--muted); text-transform: uppercase;
      letter-spacing: 1px; margin-bottom: 10px;
      display: flex; align-items: center; gap: 6px;
    }
    .product-name {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.8rem, 3.5vw, 2.4rem);
      font-weight: 800; color: var(--warm-brown);
      line-height: 1.2; margin-bottom: 16px;
    }
    .product-price-row {
      display: flex; align-items: center; gap: 16px;
      margin-bottom: 20px;
    }
    .product-price {
      font-size: 2rem; font-weight: 900; color: var(--terracotta);
    }
    .rating {
      display: flex; align-items: center; gap: 6px;
      font-size: 0.875rem; color: var(--muted); font-weight: 700;
    }
    .stars { color: #f5a623; letter-spacing: -1px; }
    .product-desc {
      color: var(--muted); line-height: 1.8;
      margin-bottom: 28px; font-size: 0.975rem;
    }

    /* ── Variant Selector ── */
    .variant-section { margin-bottom: 28px; }
    .variant-label {
      font-weight: 800; font-size: 0.875rem;
      color: var(--warm-brown); margin-bottom: 10px;
      display: flex; align-items: center; gap: 8px;
    }
    .variant-selected {
      font-weight: 600; color: var(--terracotta);
    }
    .variant-options {
      display: flex; gap: 8px; flex-wrap: wrap;
    }
    .variant-btn {
      padding: 8px 18px; border-radius: 50px;
      border: 2px solid var(--border);
      background: #fff; color: var(--warm-brown);
      font-family: 'Nunito', sans-serif;
      font-weight: 700; font-size: 0.875rem;
      cursor: pointer; transition: all 0.2s;
    }
    .variant-btn:hover { border-color: var(--terracotta); color: var(--terracotta); }
    .variant-btn.selected {
      background: var(--warm-brown); border-color: var(--warm-brown); color: #fff;
    }

    /* ── Qty + Add ── */
    .atc-row {
      display: flex; align-items: center; gap: 14px;
      margin-bottom: 16px; flex-wrap: wrap;
    }
    .qty-control {
      display: flex; align-items: center;
      border: 2px solid var(--border); border-radius: 50px;
      overflow: hidden; background: #fff;
    }
    .qty-control button {
      width: 40px; height: 44px;
      background: none; border: none;
      font-size: 1.2rem; font-weight: 700;
      color: var(--warm-brown);
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
    }
    .qty-control button:hover { background: var(--off-white); }
    .qty-control input {
      width: 44px; text-align: center;
      border: none; outline: none;
      font-family: 'Nunito', sans-serif;
      font-size: 1rem; font-weight: 800;
      color: var(--warm-brown); background: transparent;
    }
    .btn-atc {
      flex: 1;
      background: linear-gradient(135deg, var(--terracotta), var(--warm-brown));
      color: #fff; border: none;
      padding: 14px 28px; border-radius: 50px;
      font-family: 'Nunito', sans-serif;
      font-size: 1rem; font-weight: 800;
      cursor: pointer; letter-spacing: 0.3px;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 16px rgba(196,98,58,0.3);
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-atc:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(196,98,58,0.4); }
    .btn-atc.added {
      background: linear-gradient(135deg, var(--sage), #5a7e5e);
      box-shadow: 0 4px 16px rgba(122,158,126,0.3);
    }
    .btn-view-cart {
      width: 100%;
      background: #fff; color: var(--warm-brown);
      border: 2px solid var(--border);
      padding: 12px 28px; border-radius: 50px;
      font-family: 'Nunito', sans-serif;
      font-size: 0.95rem; font-weight: 800;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
      display: none;
    }
    .btn-view-cart:hover { border-color: var(--warm-brown); }
    .btn-view-cart.visible { display: block; }

    /* ── Details accordion ── */
    .details-section { margin-top: 32px; }
    .detail-toggle {
      width: 100%; background: none; border: none;
      border-top: 1px solid var(--border);
      padding: 16px 0;
      display: flex; align-items: center; justify-content: space-between;
      font-family: 'Nunito', sans-serif;
      font-size: 0.95rem; font-weight: 800;
      color: var(--warm-brown); cursor: pointer;
      transition: color 0.2s;
    }
    .detail-toggle:hover { color: var(--terracotta); }
    .detail-toggle .arrow {
      transition: transform 0.3s;
      font-size: 0.8rem; opacity: 0.6;
    }
    .detail-toggle.open .arrow { transform: rotate(180deg); }
    .detail-body {
      display: none;
      padding: 0 0 16px;
      color: var(--muted); font-size: 0.9rem; line-height: 1.8;
    }
    .detail-body.open { display: block; }

    /* ── Related Products ── */
    .related-section {
      max-width: 1200px; margin: 0 auto 80px;
      padding: 0 24px;
    }
    .related-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem; font-weight: 800;
      color: var(--warm-brown); margin-bottom: 24px;
    }
    .related-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px;
    }
    .product-card {
      background: #fff;
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: transform 0.25s ease, box-shadow 0.25s ease;
      display: flex; flex-direction: column;
    }
    .product-card:hover { transform: translateY(-6px); box-shadow: var(--shadow-hover); }
    .card-img {
      height: 160px;
      display: flex; align-items: center; justify-content: center;
      font-size: 4rem;
    }
    .card-body { padding: 16px; flex: 1; display: flex; flex-direction: column; }
    .card-name {
      font-family: 'Playfair Display', serif;
      font-size: 1rem; font-weight: 700;
      color: var(--warm-brown); margin-bottom: 8px;
    }
    .card-footer { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-top: auto; }
    .card-price { font-size: 1rem; font-weight: 900; color: var(--terracotta); }
    .btn-add {
      background: var(--off-white); border: 2px solid var(--border);
      color: var(--warm-brown); padding: 7px 14px;
      border-radius: 50px; font-weight: 800; font-size: 0.82rem;
      transition: all 0.2s; white-space: nowrap;
    }
    .btn-add:hover { background: var(--terracotta); border-color: var(--terracotta); color: #fff; }
    .btn-add.added { background: var(--sage); border-color: var(--sage); color: #fff; }

    /* ── Not found ── */
    .not-found {
      text-align: center; padding: 80px 24px;
      max-width: 500px; margin: 0 auto;
    }
    .not-found .big-emoji { font-size: 4rem; margin-bottom: 16px; }
    .not-found h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem; color: var(--warm-brown);
      margin-bottom: 12px;
    }
    .not-found p { color: var(--muted); margin-bottom: 24px; }
    .btn-primary {
      background: linear-gradient(135deg, var(--terracotta), var(--warm-brown));
      color: #fff; border: none;
      padding: 12px 28px; border-radius: 50px;
      font-family: 'Nunito', sans-serif;
      font-size: 1rem; font-weight: 800;
      cursor: pointer; display: inline-block;
    }

    /* ── Footer ── */
    footer {
      background: var(--warm-brown);
      color: rgba(255,248,240,0.85);
      padding: 48px 24px 32px;
    }
    .footer-inner { max-width: 1200px; margin: 0 auto; }
    .footer-logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem; font-weight: 800;
      color: var(--cream);
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 16px;
    }
    .footer-bottom {
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 12px;
    }
    .footer-bottom p { font-size: 0.82rem; opacity: 0.6; }
    .footer-badges { display: flex; gap: 8px; align-items: center; }
    .footer-badge {
      background: rgba(255,248,240,0.1);
      padding: 4px 10px; border-radius: 6px;
      font-size: 0.75rem; font-weight: 700;
      color: rgba(255,248,240,0.7);
    }

    /* ── Responsive ── */
    @media (max-width: 900px) {
      .product-container { grid-template-columns: 1fr; gap: 32px; }
      .product-image-panel { position: static; }
    }
    @media (max-width: 640px) {
      .nav { display: none; }
      .hamburger { display: flex; }
      .product-container { padding: 0 16px; }
      .related-section { padding: 0 16px; }
    }
  </style>
</head>
<body>

<!-- ── Header ── -->
<header class="header">
  <div class="header-inner">
    <a href="index.html" class="logo"><img src="logo.svg" alt="Lazy Capys logo"> Lazy Capys</a>
    <nav class="nav" aria-label="Main navigation">
      <a href="index.html">Home</a>
      <a href="shop.html" class="active">Shop</a>
    </nav>
    <div class="header-actions">
      <button class="cart-icon-btn" aria-label="Open cart">
        🛒
        <span class="cart-badge" aria-live="polite">0</span>
      </button>
      <button class="hamburger" id="hamburger-btn" aria-label="Open menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>
</header>
<nav class="mobile-nav" id="mobile-nav" aria-label="Mobile navigation">
  <a href="index.html">🏠 Home</a>
  <a href="shop.html">🛍 Shop</a>
</nav>

<!-- ── Content (populated by JS) ── -->
<div id="page-content"></div>

<!-- ── Footer ── -->
<footer>
  <div class="footer-inner">
    <div class="footer-logo"><img src="logo.svg" alt="" style="width:28px;height:28px;border-radius:50%;"> Lazy Capys</div>
    <div class="footer-bottom">
      <p>© 2026 Lazy Capys. Made with 🧡 for capybara lovers everywhere.</p>
      <div class="footer-badges">
        <span class="footer-badge">🌿 Eco Packaging</span>
        <span class="footer-badge">🔒 Secure</span>
        <span class="footer-badge">🖨️ Printful</span>
      </div>
    </div>
  </div>
</footer>

<script src="cart.js"></script>
<script>
  // ── Hamburger ──
  const hamburger = document.getElementById('hamburger-btn');
  const mobileNav = document.getElementById('mobile-nav');
  hamburger.addEventListener('click', () => {
    const open = mobileNav.classList.toggle('open');
    hamburger.setAttribute('aria-expanded', open);
    const spans = hamburger.querySelectorAll('span');
    if (open) {
      spans[0].style.transform = 'rotate(45deg) translate(5px, 5px)';
      spans[1].style.opacity = '0';
      spans[2].style.transform = 'rotate(-45deg) translate(5px, -5px)';
    } else {
      spans.forEach(s => { s.style.transform = ''; s.style.opacity = ''; });
    }
  });

  // ── Page logic ──
  function renderProduct() {
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');
    const product = id ? window.CAPY_PRODUCTS.find(p => p.id === id) : null;
    const content = document.getElementById('page-content');

    if (!product) {
      content.innerHTML = `
        <div class="not-found">
          <div class="big-emoji">🦫</div>
          <h2>Product not found</h2>
          <p>That capy seems to have wandered off. Let's get you back to the shop!</p>
          <a href="shop.html" class="btn-primary">Back to Shop</a>
        </div>`;
      return;
    }

    // Update page title
    document.title = product.name + ' — Lazy Capys';
    document.querySelector('meta[name="description"]').content = product.description;

    // Get related products (same category, different product)
    const related = window.CAPY_PRODUCTS.filter(p => p.id !== product.id && p.category === product.category).slice(0, 4);
    const alsoRelated = window.CAPY_PRODUCTS.filter(p => p.id !== product.id && p.category !== product.category).slice(0, Math.max(0, 4 - related.length));
    const relatedProducts = [...related, ...alsoRelated].slice(0, 4);

    const variantHTML = product.variants ? `
      <div class="variant-section">
        <div class="variant-label">
          Option: <span class="variant-selected" id="variant-selected">${product.variants[0]}</span>
        </div>
        <div class="variant-options" id="variant-options">
          ${product.variants.map((v, i) => `
            <button class="variant-btn ${i === 0 ? 'selected' : ''}" data-variant="${v}">${v}</button>
          `).join('')}
        </div>
      </div>
    ` : '';

    const relatedHTML = relatedProducts.length > 0 ? `
      <div class="related-section">
        <h2 class="related-title">You might also like</h2>
        <div class="related-grid">
          ${relatedProducts.map(p => `
            <article class="product-card">
              <a href="product.html?id=${p.id}" style="text-decoration:none;color:inherit;">
                <div class="card-img" style="background:${p.gradient}">
                  <span aria-hidden="true">${p.emoji}</span>
                </div>
              </a>
              <div class="card-body">
                <a href="product.html?id=${p.id}" style="text-decoration:none;">
                  <h3 class="card-name">${p.name}</h3>
                </a>
                <div class="card-footer">
                  <span class="card-price">$${p.price.toFixed(2)}</span>
                  <button class="btn-add" data-id="${p.id}" aria-label="Add ${p.name} to cart">Add</button>
                </div>
              </div>
            </article>
          `).join('')}
        </div>
      </div>
    ` : '';

    content.innerHTML = `
      <nav class="breadcrumb" aria-label="Breadcrumb">
        <a href="index.html">Home</a>
        <span>›</span>
        <a href="shop.html">Shop</a>
        <span>›</span>
        <a href="shop.html?category=${product.category}">${product.category.charAt(0).toUpperCase() + product.category.slice(1)}</a>
        <span>›</span>
        <span>${product.name}</span>
      </nav>

      <div class="product-container">
        <!-- Image Panel -->
        <div class="product-image-panel">
          <div class="product-image-wrap">
            <div class="product-image-main">
              <div class="product-image-box" style="background:${product.gradient}">
                <span aria-hidden="true">${product.emoji}</span>
              </div>
            </div>
            ${product.badge ? `<div class="product-image-badge" style="background:${product.badgeColor || '#C4623A'}">${product.badge}</div>` : ''}
          </div>
          <div class="product-trust">
            <div class="trust-item"><span>🚚</span> Free over $50</div>
            <div class="trust-item"><span>🌿</span> Eco packaging</div>
            <div class="trust-item"><span>🔄</span> Easy returns</div>
          </div>
        </div>

        <!-- Info Panel -->
        <div class="product-info">
          <div class="product-category">${product.category}</div>
          <h1 class="product-name">${product.name}</h1>
          <div class="product-price-row">
            <span class="product-price">$${product.price.toFixed(2)}</span>
            <div class="rating">
              <span class="stars">★★★★★</span>
              <span>4.9 (42 reviews)</span>
            </div>
          </div>
          <p class="product-desc">${product.longDescription || product.description}</p>

          ${variantHTML}

          <div class="atc-row">
            <div class="qty-control" aria-label="Quantity">
              <button id="qty-dec" aria-label="Decrease quantity">−</button>
              <input type="number" id="qty-input" value="1" min="1" max="99" aria-label="Quantity" />
              <button id="qty-inc" aria-label="Increase quantity">+</button>
            </div>
            <button class="btn-atc" id="btn-atc">🛒 Add to Cart</button>
          </div>
          <button class="btn-view-cart" id="btn-view-cart">View Cart →</button>

          <div class="details-section">
            <button class="detail-toggle open" data-target="detail-desc">
              Product Details <span class="arrow">▾</span>
            </button>
            <div class="detail-body open" id="detail-desc">
              ${product.longDescription || product.description}
            </div>
            <button class="detail-toggle" data-target="detail-shipping">
              Shipping & Returns <span class="arrow">▾</span>
            </button>
            <div class="detail-body" id="detail-shipping">
              Orders are printed and fulfilled via Printful, usually within 2–5 business days. Standard shipping takes 3–7 business days (US). Free shipping on orders over $50. Returns accepted within 30 days — just email us!
            </div>
            <button class="detail-toggle" data-target="detail-care">
              Care Instructions <span class="arrow">▾</span>
            </button>
            <div class="detail-body" id="detail-care">
              ${product.category === 'plushies'
                ? 'Surface wash recommended. Do not submerge in water. Air dry. Do not tumble dry or iron.'
                : product.category === 'apparel'
                ? 'Machine wash cold with like colors. Tumble dry low. Do not bleach. Iron inside out on low heat.'
                : 'Wipe clean with a damp cloth. For mugs: dishwasher safe (top rack). For enamel pins: do not submerge in water.'}
            </div>
          </div>
        </div>
      </div>

      ${relatedHTML}
    `;

    // ── Variant logic ──
    let selectedVariant = product.variants ? product.variants[0] : null;

    if (product.variants) {
      document.getElementById('variant-options').addEventListener('click', e => {
        const btn = e.target.closest('.variant-btn');
        if (!btn) return;
        selectedVariant = btn.dataset.variant;
        document.getElementById('variant-selected').textContent = selectedVariant;
        document.querySelectorAll('.variant-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
      });
    }

    // ── Qty controls ──
    const qtyInput = document.getElementById('qty-input');
    document.getElementById('qty-dec').addEventListener('click', () => {
      qtyInput.value = Math.max(1, parseInt(qtyInput.value) - 1);
    });
    document.getElementById('qty-inc').addEventListener('click', () => {
      qtyInput.value = Math.min(99, parseInt(qtyInput.value) + 1);
    });

    // ── Add to Cart ──
    const btnAtc = document.getElementById('btn-atc');
    const btnViewCart = document.getElementById('btn-view-cart');

    btnAtc.addEventListener('click', () => {
      const qty = Math.max(1, parseInt(qtyInput.value) || 1);
      window.CapyCart.addToCart(product, selectedVariant, qty);
      btnAtc.textContent = '✓ Added to Cart!';
      btnAtc.classList.add('added');
      btnViewCart.classList.add('visible');
      setTimeout(() => {
        btnAtc.innerHTML = '🛒 Add to Cart';
        btnAtc.classList.remove('added');
      }, 2000);
    });

    btnViewCart.addEventListener('click', () => window.CapyCart.openDrawer());

    // ── Detail toggles ──
    document.querySelectorAll('.detail-toggle').forEach(btn => {
      btn.addEventListener('click', () => {
        const targetId = btn.dataset.target;
        const body = document.getElementById(targetId);
        const isOpen = body.classList.contains('open');
        body.classList.toggle('open', !isOpen);
        btn.classList.toggle('open', !isOpen);
      });
    });

    // ── Related product quick-add ──
    document.querySelectorAll('.btn-add[data-id]').forEach(btn => {
      btn.addEventListener('click', () => {
        const p = window.CAPY_PRODUCTS.find(x => x.id === btn.dataset.id);
        if (!p) return;
        window.CapyCart.addToCart(p, null, 1);
        btn.textContent = '✓';
        btn.classList.add('added');
        setTimeout(() => {
          btn.textContent = 'Add';
          btn.classList.remove('added');
        }, 1800);
      });
    });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', renderProduct);
  } else {
    renderProduct();
  }
</script>
</body>
</html>
