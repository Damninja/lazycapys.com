<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="100" fill="#C4623A"/>

  <!-- Head base -->
  <ellipse cx="100" cy="116" rx="76" ry="66" fill="#7C4A2D"/>

  <!-- Forehead fur highlight -->
  <ellipse cx="100" cy="62" rx="50" ry="22" fill="#8B5535" opacity="0.4"/>

  <!-- Left ear -->
  <ellipse cx="42" cy="66" rx="24" ry="20" fill="#6A3820"/>
  <ellipse cx="42" cy="66" rx="15" ry="12" fill="#D47040"/>

  <!-- Right ear -->
  <ellipse cx="158" cy="66" rx="24" ry="20" fill="#6A3820"/>
  <ellipse cx="158" cy="66" rx="15" ry="12" fill="#D47040"/>

  <!-- Muzzle / snout -->
  <ellipse cx="100" cy="138" rx="52" ry="33" fill="#9B6040"/>

  <!-- Left eye -->
  <circle cx="70" cy="100" r="19" fill="white"/>
  <circle cx="72" cy="101" r="13" fill="#1A0804"/>
  <circle cx="77" cy="95" r="5" fill="white"/>
  <circle cx="79" cy="102" r="2.5" fill="white" opacity="0.55"/>

  <!-- Right eye -->
  <circle cx="130" cy="100" r="19" fill="white"/>
  <circle cx="132" cy="101" r="13" fill="#1A0804"/>
  <circle cx="137" cy="95" r="5" fill="white"/>
  <circle cx="139" cy="102" r="2.5" fill="white" opacity="0.55"/>

  <!-- Cheek blush -->
  <ellipse cx="52" cy="118" rx="17" ry="10" fill="#E08060" opacity="0.22"/>
  <ellipse cx="148" cy="118" rx="17" ry="10" fill="#E08060" opacity="0.22"/>

  <!-- Nostrils -->
  <ellipse cx="86" cy="130" rx="10" ry="8" fill="#3A1808"/>
  <ellipse cx="114" cy="130" rx="10" ry="8" fill="#3A1808"/>

  <!-- Smile -->
  <path d="M 82 148 Q 100 160 118 148" stroke="#3A1808" stroke-width="3.5" fill="none" stroke-linecap="round"/>

  <!-- Whisker dots -->
  <circle cx="54" cy="132" r="3" fill="#3A1808" opacity="0.5"/>
  <circle cx="54" cy="142" r="3" fill="#3A1808" opacity="0.5"/>
  <circle cx="146" cy="132" r="3" fill="#3A1808" opacity="0.5"/>
  <circle cx="146" cy="142" r="3" fill="#3A1808" opacity="0.5"/>
</svg>
